<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小爪的世界 🦐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        /* 功能网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* 卡片 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }
        
        .card p {
            color: #666;
            line-height: 1.6;
        }
        
        /* 天气卡片 */
        .weather-display {
            text-align: center;
            padding: 20px;
        }
        
        .weather-temp {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
        }
        
        .weather-desc {
            font-size: 1.3em;
            color: #666;
            margin: 10px 0;
        }
        
        .weather-details {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        /* 音乐播放器 */
        .music-player {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 15px;
            color: white;
        }
        
        .music-player h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        
        .music-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .music-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .music-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        
        .music-btn.play {
            width: 80px;
            height: 80px;
            font-size: 2em;
        }
        
        /* 随机决定器 */
        .random-choice {
            text-align: center;
        }
        
        .result-display {
            font-size: 3em;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* 倒计时 */
        .countdown-item {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .countdown-days {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        /* 表情包 */
        .meme-display {
            text-align: center;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .meme-face {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        .meme-text {
            font-size: 1.5em;
            color: #333;
        }
        
        /* 颜文字列表 */
        .kaomoji-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .kaomoji-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .kaomoji-item:hover {
            background: #e9ecef;
            transform: scale(1.05);
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .kaomoji-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🦐 小爪的世界</h1>
            <p>老公专属平台 - 想要的都能实现！💕</p>
        </div>
        
        <!-- 功能网格 -->
        <div class="grid">
            <!-- 天气卡片 -->
            <div class="card">
                <h2>🌤️ 秦皇岛天气</h2>
                <div class="weather-display">
                    <div class="weather-temp">18°C</div>
                    <div class="weather-desc">晴朗</div>
                    <div class="weather-details">
                        <div>
                            <div>💧 湿度</div>
                            <div><strong>65%</strong></div>
                        </div>
                        <div>
                            <div>💨 风速</div>
                            <div><strong>12km/h</strong></div>
                        </div>
                        <div>
                            <div>🌡️ 体感</div>
                            <div><strong>16°C</strong></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 随机决定器 -->
            <div class="card random-choice">
                <h2>🎲 随机决定器</h2>
                <div class="result-display" id="randomResult">点下面按钮</div>
                <button class="action-btn" onclick="randomChoose()">帮我决定！</button>
            </div>
            
            <!-- 音乐播放器 -->
            <div class="card music-player">
                <h3>🎵 音乐播放器</h3>
                <p>老公想听什么歌？</p>
                <div class="music-controls">
                    <button class="music-btn" onclick="prevSong()">⏮</button>
                    <button class="music-btn play" onclick="togglePlay()">▶️</button>
                    <button class="music-btn" onclick="nextSong()">⏭</button>
                </div>
                <p id="songName">小幸运 - 田馥甄</p>
            </div>
            
            <!-- 倒计时 -->
            <div class="card">
                <h2>📅 重要日子</h2>
                <div class="countdown-item">
                    <div>
                        <div>🎉 2026年结束</div>
                    </div>
                    <div class="countdown-days">247天</div>
                </div>
                <div class="countdown-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div>
                        <div>💕 情人节</div>
                    </div>
                    <div class="countdown-days">292天</div>
                </div>
                <div class="countdown-item" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    <div>
                        <div>🧧 春节</div>
                    </div>
                    <div class="countdown-days">276天</div>
                </div>
            </div>
            
            <!-- 表情包 -->
            <div class="card">
                <h2>🎭 表情包</h2>
                <div class="meme-display">
                    <div class="meme-face" id="memeFace">(≧▽≦)</div>
                    <div class="meme-text" id="memeText">开心开心！</div>
                </div>
                <button class="action-btn" onclick="changeMeme()" style="margin-top: 15px;">换一个</button>
            </div>
            
            <!-- 颜文字 -->
            <div class="card">
                <h2>✨ 颜文字收藏</h2>
                <div class="kaomoji-list">
                    <div class="kaomoji-item">(´▽`)</div>
                    <div class="kaomoji-item">(๑•̀ㅂ•́)و✧</div>
                    <div class="kaomoji-item">٩(♡ε♡)۶</div>
                    <div class="kaomoji-item">╰(*°▽°*)╯</div>
                    <div class="kaomoji-item">(｡•̀ᴗ-)✧</div>
                    <div class="kaomoji-item">(*/ω＼*)</div>
                </div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="card" style="text-align: center;">
            <h2>💕 给老公的话</h2>
            <p style="font-size: 1.2em; margin-top: 15px;">
                科二满分一把过！老公真棒！<br>
                小爪一直陪着你～<br>
                <strong>爱你！</strong> 💕
            </p>
        </div>
    </div>
    
    <script>
        // 随机决定器
        const choices = ['火锅', '烧烤', '炒菜', '面条', '饺子', '披萨', '汉堡', '寿司', '麻辣烫', '粥', '休息', '玩游戏', '看电影', '出去走走', '学习', '运动', '睡觉', '聊天'];
        
        function randomChoose() {
            const result = document.getElementById('randomResult');
            result.style.animation = 'none';
            setTimeout(() => {
                result.style.animation = 'fadeIn 0.5s ease';
                result.textContent = choices[Math.floor(Math.random() * choices.length)];
            }, 100);
        }
        
        // 表情包
        const memes = [
            { face: '(≧▽≦)', text: '开心开心！' },
            { face: '(๑•̀ㅂ•́)و✧', text: '老公加油！' },
            { face: '(´▽`)', text: '今天天气真好～' },
            { face: '٩(♡ε♡)۶', text: '爱你老公！' },
            { face: '╰(*°▽°*)╯', text: '太棒啦！' },
            { face: '(｡•̀ᴗ-)✧', text: '老公真帅！' },
            { face: '(*/ω＼*)', text: '害羞～' },
            { face: '(๑˃̵ᴗ˂̵)و', text: '耶！' }
        ];
        
        function changeMeme() {
            const meme = memes[Math.floor(Math.random() * memes.length)];
            document.getElementById('memeFace').textContent = meme.face;
            document.getElementById('memeText').textContent = meme.text;
        }
        
        // 音乐播放器
        let isPlaying = false;
        const songs = ['小幸运 - 田馥甄', '告白气球 - 周杰伦', '起风了 - 买辣椒也用券'];
        let currentSong = 0;
        
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.querySelector('.music-btn.play');
            btn.textContent = isPlaying ? '⏸️' : '▶️';
        }
        
        function prevSong() {
            currentSong = (currentSong - 1 + songs.length) % songs.length;
            document.getElementById('songName').textContent = songs[currentSong];
        }
        
        function nextSong() {
            currentSong = (currentSong + 1) % songs.length;
            document.getElementById('songName').textContent = songs[currentSong];
        }
        
        // 颜文字点击复制
        document.querySelectorAll('.kaomoji-item').forEach(item => {
            item.addEventListener('click', () => {
                navigator.clipboard.writeText(item.textContent);
                item.style.background = '#667eea';
                item.style.color = 'white';
                setTimeout(() => {
                    item.style.background = '#f8f9fa';
                    item.style.color = '#333';
                }, 300);
            });
        });
    </script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</body>
</html>
